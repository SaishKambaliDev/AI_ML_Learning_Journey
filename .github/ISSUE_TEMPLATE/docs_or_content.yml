name: Docs or content improvement
description: Suggest a docs fix, lesson improvement, translation task, or contributor-onboarding improvement.
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: What needs improvement?
      placeholder: The README explains local setup, but it does not show a judge-friendly demo flow...
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      placeholder: Add a short demo script and screenshots near the top of the README...
    validations:
      required: true
  - type: dropdown
    id: doc_area
    attributes:
      label: Area
      options:
        - README
        - Demo docs
        - Contributor docs
        - Lesson content
        - Translation
        - Architecture docs
    validations:
      required: true

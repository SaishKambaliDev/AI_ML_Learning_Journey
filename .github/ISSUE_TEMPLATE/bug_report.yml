name: Bug report
description: Report a broken flow, regression, or unexpected behavior.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and include the impact on users.
      placeholder: The compiler panel stops updating after the second run...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path to reproduce the problem.
      placeholder: |
        1. Start the app in demo mode
        2. Open the compiler
        3. Run the sample code
        4. Click Next several times
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The memory timeline should continue updating...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, execution mode, and any relevant config details.
      placeholder: Chrome on Ubuntu, DEMO_MODE=true, local gcc
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Logs, screenshots, or related details.
